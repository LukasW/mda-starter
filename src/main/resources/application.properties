quarkus.application.name=clm
quarkus.http.port=8080

# --- Dev: H2 in-memory, Flyway migriert Schema beim Start ---
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:clm;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:clm-test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=

# --- Prod: PostgreSQL (Override via Env/Secret) ---
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${CLM_DB_URL:jdbc:postgresql://db:5432/clm}
%prod.quarkus.datasource.username=${CLM_DB_USER:clm}
%prod.quarkus.datasource.password=${CLM_DB_PASSWORD:clm}

# --- Hibernate ORM ---
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- OpenAPI / Health ---
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.smallrye-health.root-path=/q/health

# --- Quinoa Frontend (Angular + Material) ---
quarkus.quinoa.ui-dir=src/main/webui
# Angular @angular/build:application legt die Bundle unter dist/webui/browser/ ab.
quarkus.quinoa.build-dir=dist/webui/browser
quarkus.quinoa.package-manager=npm
# Verwendet System-Node (>=22). Fuer isolierte Installation siehe Quinoa-Doku.
quarkus.quinoa.package-manager-install=false
# Angular dev-server Standardport.
quarkus.quinoa.dev-server.port=4200
quarkus.quinoa.enable-spa-routing=true
# Backend-Pfade nie an ng serve weiterreichen (verhindert Loop-Risiken).
quarkus.quinoa.ignored-path-prefixes=/api,/q,/openapi
# Beim @QuarkusTest nicht aktivieren (spart ng build im Unit-Test-Lauf).
%test.quarkus.quinoa.enabled=false

# --- Obligation-Scheduler Default (disabled in dev/test) ---
%dev.clm.obligation.scheduler.enabled=false
%test.clm.obligation.scheduler.enabled=false
%prod.clm.obligation.scheduler.enabled=true

# --- Logging ---
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
