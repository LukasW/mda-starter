# CLM Backend — Contract Lifecycle Management
quarkus.application.name=clm
quarkus.http.port=8080

# HTTP / CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200

# Default (prod-aehnlich)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/clm
quarkus.datasource.username=clm
quarkus.datasource.password=clm
quarkus.hibernate-orm.schema-management.strategy=validate

# Dev-Profile: H2 in-memory, Flyway migriert on-start
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:clm;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.hibernate-orm.schema-management.strategy=validate

# Test-Profile: H2 in-memory
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:clm-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.schema-management.strategy=validate

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# OpenAPI / Swagger-UI
quarkus.smallrye-openapi.info-title=CLM API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Contract Lifecycle Management — MDA Starter
quarkus.swagger-ui.always-include=true

# Quinoa (Angular 21 + Material via ng dev-server)
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.build-dir=dist/webui/browser
quarkus.quinoa.package-manager-install=false
quarkus.quinoa.dev-server.port=4200
quarkus.quinoa.dev-server.check-timeout=180000
quarkus.quinoa.enable-spa-routing=true
# KRITISCH gegen Proxy-Loop:
quarkus.quinoa.ignored-path-prefixes=/api,/q,/openapi
# @QuarkusTest soll kein ng build triggern:
%test.quarkus.quinoa.enabled=false

# Logging (JSON wenn Bedarf; JVM-Default hier lesbar)
quarkus.log.level=INFO
quarkus.log.category."ch.grudligstrasse.mda.clm".level=DEBUG

# CLM-spezifische Schalter
clm.archiv.extern.enabled=false
clm.person.externe-verwaltung.enabled=false
clm.signatur.anbieter=stub
