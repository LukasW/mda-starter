<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button aria-label="Navigation umschalten" (click)="toggleSidenav()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">Contract Lifecycle Management</span>
  <span class="spacer"></span>
  <span class="env-label">MVP V1</span>
</mat-toolbar>

<mat-sidenav-container class="app-container" autosize>
  <mat-sidenav #sidenav mode="side" [opened]="sidenavOpen()" class="app-sidenav">
    <mat-nav-list>
      @for (entry of navigation; track entry.route) {
        <a mat-list-item
           [routerLink]="entry.route"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{ exact: entry.route === '/vertraege' }">
          <mat-icon matListItemIcon>{{ entry.icon }}</mat-icon>
          <span matListItemTitle>{{ entry.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
