<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="toggle()" aria-label="Navigation umschalten">
    <mat-icon>menu</mat-icon>
  </button>
  <span>CLM — Contract Lifecycle</span>
</mat-toolbar>

<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav mode="side" [opened]="opened()">
    <mat-nav-list>
      <a mat-list-item routerLink="/vertraege" routerLinkActive="active-link">
        <mat-icon matListItemIcon>description</mat-icon>
        <span matListItemTitle>Verträge</span>
      </a>
      <a mat-list-item routerLink="/vertraege/neu" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>Neuer Vertrag</span>
      </a>
      <a mat-list-item routerLink="/personen" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Personen</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="app-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
